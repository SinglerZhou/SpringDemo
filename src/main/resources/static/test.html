<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户API测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        
        .result pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .success {
            border-left-color: #28a745;
            background: #d4edda;
        }
        
        .error {
            border-left-color: #dc3545;
            background: #f8d7da;
        }
        
        .info {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
            padding: 10px;
            background: #e7f3ff;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 用户服务API测试</h1>
        
        <!-- 注册测试 -->
        <div class="card">
            <h2>📝 用户注册</h2>
            <div class="info">
                接口地址：POST http://localhost:8080/api/user/register
            </div>
            
            <div class="form-group">
                <label>姓名：</label>
                <input type="text" id="registerName" value="张三" placeholder="请输入姓名">
            </div>
            
            <div class="form-group">
                <label>邮箱：</label>
                <input type="email" id="registerEmail" value="zhangsan@example.com" placeholder="请输入邮箱">
            </div>
            
            <div class="form-group">
                <label>密码：</label>
                <input type="password" id="registerPassword" value="123456" placeholder="请输入密码">
            </div>
            
            <div class="form-group">
                <label>手机号：</label>
                <input type="text" id="registerPhone" value="13800138000" placeholder="请输入手机号">
            </div>
            
            <button onclick="testRegister()">测试注册</button>
            
            <div class="result" id="registerResult" style="display:none;">
                <pre id="registerResultContent"></pre>
            </div>
        </div>
        
        <!-- 登录测试 -->
        <div class="card">
            <h2>🔐 用户登录</h2>
            <div class="info">
                接口地址：POST http://localhost:8080/api/user/login
            </div>
            
            <div class="form-group">
                <label>邮箱：</label>
                <input type="email" id="loginEmail" value="zhangsan@example.com" placeholder="请输入邮箱">
            </div>
            
            <div class="form-group">
                <label>密码：</label>
                <input type="password" id="loginPassword" value="123456" placeholder="请输入密码">
            </div>
            
            <button onclick="testLogin()">测试登录</button>
            
            <div class="result" id="loginResult" style="display:none;">
                <pre id="loginResultContent"></pre>
            </div>
        </div>
    </div>

    <script>
        // 显示结果
        function showResult(elementId, contentId, data, isSuccess) {
            const resultDiv = document.getElementById(elementId);
            const contentPre = document.getElementById(contentId);
            
            resultDiv.style.display = 'block';
            resultDiv.className = 'result ' + (isSuccess ? 'success' : 'error');
            contentPre.textContent = JSON.stringify(data, null, 2);
        }

        // 测试注册
        async function testRegister() {
            const registerData = {
                name: document.getElementById('registerName').value,
                email: document.getElementById('registerEmail').value,
                password: document.getElementById('registerPassword').value,
                phone: document.getElementById('registerPhone').value
            };

            try {
                const response = await fetch('http://localhost:8080/api/user/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(registerData)
                });
                
                const result = await response.json();
                showResult('registerResult', 'registerResultContent', result, result.code === 200);
            } catch (error) {
                showResult('registerResult', 'registerResultContent', { 
                    error: '请求失败: ' + error.message 
                }, false);
            }
        }

        // 测试登录
        async function testLogin() {
            const loginData = {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            };

            try {
                const response = await fetch('http://localhost:8080/api/user/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(loginData)
                });
                
                const result = await response.json();
                showResult('loginResult', 'loginResultContent', result, result.code === 200);
            } catch (error) {
                showResult('loginResult', 'loginResultContent', { 
                    error: '请求失败: ' + error.message 
                }, false);
            }
        }
    </script>
</body>
</html>
